<!DOCTYPE html>
<html>
<head>
    <title>Schedule Pickup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="navbar">
    <h2><i class="fas fa-recycle"></i> Waste System</h2>

    <div class="nav-links">
        <a href="/home">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/pickup">Pickup</a>
        <a href="/contact">Contact</a>
        <a href="/about">About</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">
    <h2>Schedule Waste Pickup</h2>

    <form method="POST">

    <label>Waste Type</label>
    <input type="text" name="waste_type" required>

    <label>Date</label>
    <input type="date" name="date" required>

    <label>Time</label>
    <input type="time" name="time" required step="60">

    <label>Address</label>
    <input type="text" name="address" required>

    <button type="submit">Schedule Pickup</button>

</form>
    {% if success %}
<div class="success-box">
    ✔ Order completed
</div>
{% endif %}
</div>

</body>
</html>
