<!DOCTYPE html>
<html>
<head>
    <title>Waste Classifier</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #1abc9c, #16a085);
            margin: 0;
            padding: 0;
            text-align: center;
            color: white;
        }

        .container {
            background: white;
            color: black;
            margin: 50px auto;
            padding: 30px;
            width: 400px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }

        h1 {
            margin-top: 30px;
        }

        input[type="file"] {
            margin: 15px 0;
        }

        button {
            padding: 10px 20px;
            background: #16a085;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #138d75;
        }

        img {
            margin-top: 15px;
            border-radius: 10px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #ecf0f1;
        }

        .prediction {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
        }

        .confidence {
            font-size: 18px;
            color: #555;
        }

        .reset-btn {
            margin-top: 15px;
            background: #e74c3c;
        }

        .reset-btn:hover {
            background: #c0392b;
        }
    </style>
</head>

<body>

    <h1>♻ Smart Waste Classification System</h1>

    <div class="container">

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" id="fileInput" required>
            <br>
            <button type="submit">Detect Waste</button>
        </form>

        <!-- Preview before upload -->
        <img id="preview" width="250" style="display:none;"/>

        {% if image_path %}
            <h3>Uploaded Image:</h3>
            <img src="{{ image_path }}" width="250">
        {% endif %}

        {% if prediction %}
        <div class="result">
            <div class="prediction">Prediction: {{ prediction }}</div>
            <div class="confidence">Confidence: {{ confidence }}%</div>

            <form method="GET">
                <button class="reset-btn">Try Another Image</button>
            </form>
        </div>
        {% endif %}

    </div>

    <!-- JavaScript for preview -->
    <script>
        const fileInput = document.getElementById("fileInput");
        const preview = document.getElementById("preview");

        fileInput.onchange = evt => {
            const [file] = fileInput.files;
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        };
    </script>

</body>
</html>
