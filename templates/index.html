<!DOCTYPE html>
<html>
<head>
    <title>Waste Classifier</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #2ecc71, #27ae60);
            color: white;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        button {
            padding: 10px 20px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #219150;
        }

        img {
            margin-top: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>♻ Waste Classification System</h1>

    <div class="container">
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <br><br>
            <button type="submit">Detect Waste</button>
        </form>

        {% if image_path %}
            <h3>Uploaded Image:</h3>
            <img src="{{ image_path }}" width="250">
        {% endif %}

        {% if prediction %}
            <h2>Prediction: {{ prediction }}</h2>
            <h3>Confidence: {{ confidence }}%</h3>
        {% endif %}
    </div>

</body>
</html>
